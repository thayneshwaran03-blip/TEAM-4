        }

            border-radius: 20px;
        }

        .stat-card {
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -8px rgba(37, 99, 235, 0.12);
        }

        .nav-link.active {
            background: #2563EB;
            color: #fff !important;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.30);
        }
        .nav-link.active i {
            color: #fff !important;
        }
        .nav-link.active .nav-text {
            color: #fff !important;
        }

        .nav-link {

            cursor: pointer;
        }
        .nav-link:hover:not(.active) {
            background: #eef2ff;
        }

        .badge-paid {
            background: #dcfce7;
            color: #16a34a;
        }
        .badge-unpaid {
            background: #fee2e2;
            color: #dc2626;
        }
        .badge-pending {
            background: #fef9c3;
            color: #ca8a04;
        }
        .badge-approved {
            background: #dcfce7;
            color: #16a34a;
        }
        .badge-rejected {
            background: #fee2e2;
            color: #dc2626;
        }

        .status-open {
            background: #dbeafe;
            color: #2563eb;
        }
        .status-resolved {
            background: #dcfce7;
            color: #16a34a;
        }
        .status-progress {
            background: #fef3c7;
            color: #d97706;
        }

        .login-left {
            background: linear-gradient(145deg, #1e40af, #2563eb);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .view-container {
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            #sidebar {
                transform: translateX(-100%);
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 1000;
                width: 280px;
                transition: transform 0.25s ease;
                box-shadow: 8px 0 30px rgba(0, 0, 0, 0.08);
            }
            #sidebar.open {
                transform: translateX(0);
            }
            #sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.25);
                z-index: 999;
            }
            #sidebar-overlay.active {
                display: block;
            }
        }

        .chart-wrapper {
            position: relative;
            height: 220px;
        }
        .chart-wrapper-bar {
            position: relative;
            height: 200px;
        }

        .truncate-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Toast container */
        #toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 380px;
            width: 100%;
            pointer-events: none;
        }
        .toast-item {
            pointer-events: auto;
            padding: 14px 20px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            border-left: 4px solid #2563EB;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            opacity: 0;
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
            color: #0b1e3a;
        }
        .toast-item.show {
            transform: translateX(0);
            opacity: 1;
        }
        .toast-item.hide {
            transform: translateX(120%);
            opacity: 0;
        }
        .toast-item.success {
            border-left-color: #16a34a;
        }
        .toast-item.success .toast-icon {
            color: #16a34a;
        }
        .toast-item.error {
            border-left-color: #dc2626;
        }
        .toast-item.error .toast-icon {
            color: #dc2626;
        }
        .toast-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
            transition: color 0.2s;
        }
        .toast-close:hover {
            color: #0b1e3a;
        }
        .toast-message {
            flex: 1;
        }

        /* Role toggle button group */
        .role-toggle-btn {
            transition: all 0.2s;
            cursor: pointer;
        }
        .role-toggle-btn.active {
            background: #2563EB;
            color: #fff;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            border-color: #2563EB;
        }
        .role-toggle-btn:not(.active):hover {
            background: #eef2ff;
        }

        /* Modal overlay */
        #modalOverlay {
            transition: opacity 0.25s ease;
        }
        #modalOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #modalOverlay:not(.hidden) {
            opacity: 1;
            pointer-events: auto;
        }
        #modalContent {
            transition: transform 0.25s ease, opacity 0.25s ease;
        }
        #modalOverlay.hidden #modalContent {
            transform: scale(0.95);
            opacity: 0;
        }
        #modalOverlay:not(.hidden) #modalContent {
            transform: scale(1);
            opacity: 1;
        }

        /* Notification panel */
        #notificationPanel {
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform-origin: top right;
        }
        #notificationPanel.hidden {
            opacity: 0;
            transform: scale(0.95) translateY(-10px);
            pointer-events: none;
        }
        #notificationPanel:not(.hidden) {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

            border-bottom: 1px solid #f1f5f9;
            padding: 0.75rem 1rem;

        }
        .notification-item:last-child {

        }

            ring: 2px solid rgba(37,99,235,0.3);

            color: #0b1e3a;

            <div class="flex items-center gap-3">

                    JD

        </div>

    <!-- MAIN CONTENT                                               -->

                    </button>

                <div class="flex items-center gap-3">

        </header>

        <!-- VIEW CONTAINER -->

    </main>
</div>

        function loadData() {

            } catch (_) { /* ignore */ }

        function saveData(data) {

        function deepMerge(target, source) {
            const result = JSON.parse(JSON.stringify(target));
            for (const key in source) {
                if (source.hasOwnProperty(key)) {
                    if (typeof source[key] === 'object' && source[key] !== null && !Array.isArray(source[key])) {
                        result[key] = deepMerge(result[key] || {}, source[key]);
                    } else {
                        result[key] = source[key];
                    }
                }
            }
            return result;

            toast.className = `toast-item ${type}`;
            toast.innerHTML = `
                <span class="toast-icon"><i class="fas ${icon}"></i></span>
                <span class="toast-message">${message}</span>
                <button class="toast-close"><i class="fas fa-times"></i></button>
            `;
            toastContainer.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            toast.querySelector('.toast-close').addEventListener('click', () => {
                dismissToast(toast);
            });

            const timer = setTimeout(() => {
                dismissToast(toast);
            }, duration);
            toast._timer = timer;
            return toast;
        }

        function dismissToast(toast) {
            if (toast._dismissed) return;
            toast._dismissed = true;
            clearTimeout(toast._timer);
            toast.classList.remove('show');
            toast.classList.add('hide');
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 350);
        }

        // =============================================================

        // =============================================================
        let modalCallback = null;

        function showModal(title, bodyHTML, confirmText = 'Confirm', cancelText = 'Cancel', onConfirm = null) {
            modalTitle.textContent = title;
            modalBody.innerHTML = bodyHTML;
            modalConfirmBtn.textContent = confirmText;
            modalCancelBtn.textContent = cancelText;
            modalCallback = onConfirm;
            modalOverlay.classList.remove('hidden');
            setTimeout(() => modalConfirmBtn.focus(), 50);
        }

        function closeModal() {
            modalOverlay.classList.add('hidden');
            modalCallback = null;
        }

        modalCloseBtn.addEventListener('click', closeModal);
        modalCancelBtn.addEventListener('click', closeModal);
        modalConfirmBtn.addEventListener('click', function() {
            if (typeof modalCallback === 'function') {
                modalCallback();
            }
            closeModal();
        });
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) closeModal();
        });

        // =============================================================
        function addNotification(message, targetRole = 'all', type = 'info') {
            const notif = {
                id: generateId(),
                message,
                targetRole,
                type,
                read: false,
                timestamp: new Date().toISOString()
            };
            appData.notifications.push(notif);
            persist();
            updateNotificationBadge();
            if (!notificationPanel.classList.contains('hidden')) {
                renderNotificationPanel();
            }
        }

        function getNotificationsForUser(user) {
            if (!user) return [];
            if (user.role === 'admin') {
                return appData.notifications.filter(n => n.targetRole === 'admin' || n.targetRole === 'all');
            } else if (user.role === 'warden') {
                return appData.notifications.filter(n => n.targetRole === 'warden' || n.targetRole === 'all');
            } else {
                return appData.notifications.filter(n => n.targetRole === 'student' || n.targetRole === 'all');
            }
        }

        function getUnreadCount(user) {
            const notifs = getNotificationsForUser(user);
            return notifs.filter(n => !n.read).length;
        }

        function updateNotificationBadge() {
            const count = currentUser ? getUnreadCount(currentUser) : 0;
            notificationBadge.textContent = count;
            notificationBadge.style.display = count > 0 ? 'flex' : 'none';
        }

        function renderNotificationPanel() {
            if (!currentUser) {
                notificationList.innerHTML = '';
                notificationEmpty.style.display = 'block';
                return;
            }
            const notifs = getNotificationsForUser(currentUser);
            notifs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (notifs.length === 0) {
                notificationList.innerHTML = '';
                notificationEmpty.style.display = 'block';
                return;
            }
            notificationEmpty.style.display = 'none';
            notificationList.innerHTML = notifs.map(n => `
                <div class="notification-item ${n.read ? '' : 'unread'} flex items-start gap-3">
                    <div class="flex-1">
                        <p class="text-sm text-gray-800">${n.message}</p>
                        <span class="text-xs text-gray-400">${formatDate(n.timestamp)}</span>
                    </div>
                    ${!n.read ? `<button class="mark-read-btn text-xs text-[#2563EB] hover:text-[#1d4ed8]" data-id="${n.id}">Mark read</button>` : ''}
                </div>
            `).join('');

            notificationList.querySelectorAll('.mark-read-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.dataset.id;
                    const notif = appData.notifications.find(n => n.id === id);
                    if (notif) {
                        notif.read = true;
                        persist();
                        renderNotificationPanel();
                        updateNotificationBadge();
                    }
                });
            });
        }

        markAllReadBtn.addEventListener('click', function() {
            if (!currentUser) return;
            const notifs = getNotificationsForUser(currentUser);
            notifs.forEach(n => {

                if (found) found.read = true;
            });
            persist();
            renderNotificationPanel();
            updateNotificationBadge();
        });

            } else {
                notificationPanel.classList.add('hidden');
            }

        // 7.  HELPERS
        // =============================================================
        function formatDate(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function formatCurrency(amount) {
            return '₹' + Number(amount).toLocaleString('en-IN');
        }

        function getInitials(name) {
            if (!name) return '?';
            const parts = name.trim().split(/\s+/);
            if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
            return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        }

        function getUserById(id) {
            return appData.users.find(u => u.id === id);
        }

        function getStudents() {
            return appData.users.filter(u => u.role === 'student');
        }

        function getWardens() {
            return appData.users.filter(u => u.role === 'warden');
        }

        function getRoomById(id) {
            return appData.rooms.find(r => r.id === id);
        }

        function getRoomForStudent(studentId) {
            return appData.rooms.find(r => r.students && r.students.includes(studentId));
        }

        function getStudentFees(studentId) {
            return appData.fees.filter(f => f.studentId === studentId);
        }

        function getStudentComplaints(studentId) {
            return appData.complaints.filter(c => c.createdBy === studentId);
        }

        function getStudentLeaves(studentId) {
            return appData.leaves.filter(l => l.studentId === studentId);
        }

        function getStudentVisitors(studentId) {
            return appData.visitors.filter(v => v.studentId === studentId);
        }

        function getTotalOutstanding(studentId) {
            return appData.fees
                .filter(f => f.studentId === studentId && f.status === 'unpaid')
                .reduce((sum, f) => sum + Number(f.amount), 0);
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        }

            if (!user) {

        // --- Manage Students ---
        function renderManageStudents() {
            const students = getStudents();
            viewContainer.innerHTML = `
                <div class="view-container">
                    <div class="bg-white rounded-xl p-6 border border-gray-200/60 shadow-sm">
                        <div class="flex items-center justify-between mb-5">
                            <div><h3 class="text-lg font-semibold text-[#0b1e3a]">Manage Students</h3><p class="text-sm text-gray-400">${students.length} students enrolled</p></div>
                            <button id="addStudentBtn" class="px-4 py-2 bg-[#2563EB] hover:bg-[#1d4ed8] text-white text-sm font-medium rounded-xl transition shadow-sm shadow-blue-500/20"><i class="fas fa-plus mr-2"></i>Add Student</button>
                        </div>
                        ${students.length ? `
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead><tr class="text-left text-xs text-gray-400 border-b border-gray-100"><th class="pb-3 font-medium">Name</th><th class="pb-3 font-medium">Email</th><th class="pb-3 font-medium">Room</th><th class="pb-3 font-medium text-center">Actions</th></tr></thead>
                                    <tbody>
                                        ${students.map(s => {
                                            const room = getRoomForStudent(s.id);
                                            return `
                                                <tr class="border-b border-gray-50 hover:bg-[#F8FAFC] transition">
                                                    <td class="py-3 font-medium text-gray-800">${s.name}</td>
                                                    <td class="py-3 text-gray-500">${s.email}</td>
                                                    <td class="py-3 text-gray-500">${room ? room.number : '—'}</td>
                                                    <td class="py-3 text-center">
                                                        <button data-userid="${s.id}" class="edit-student-btn text-blue-600 hover:text-blue-800 mr-2" title="Edit"><i class="fas fa-edit"></i></button>
                                                        <button data-userid="${s.id}" class="delete-student-btn text-red-600 hover:text-red-800" title="Delete"><i class="fas fa-trash"></i></button>
                                                    </td>
                                                </tr>
                                            `;
                                        }).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : '<p class="text-sm text-gray-400 text-center py-8">No students found.</p>'}
                    </div>
                </div>
            `;

            // Add Student
            document.getElementById('addStudentBtn').addEventListener('click', () => {
                const roomOptions = appData.rooms.map(r =>
                    `<option value="${r.id}">${r.number} (${r.occupied}/${r.capacity})</option>`
                ).join('');
                const formHTML = `
                    <div class="space-y-4">
                        <div><label class="text-xs font-medium text-gray-500 block mb-1">Full Name</label><input type="text" id="newStudentName" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB]/30 focus:border-[#2563EB] transition" placeholder="e.g. Jane Doe"></div>
                        <div><label class="text-xs font-medium text-gray-500 block mb-1">Email</label><input type="email" id="newStudentEmail" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB]/30 focus:border-[#2563EB] transition" placeholder="student@hostel.edu"></div>
                        <div><label class="text-xs font-medium text-gray-500 block mb-1">Password</label><input type="text" id="newStudentPassword" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB]/30 focus:border-[#2563EB] transition" placeholder="Enter a password" value="pass123"></div>
                        <div><label class="text-xs font-medium text-gray-500 block mb-1">Assign Room</label>
                            <select id="newStudentRoom" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB]/30 focus:border-[#2563EB] transition">
                                <option value="">— No room —</option>
                                ${roomOptions}
                            </select>
                        </div>
                    </div>
                `;
                showModal('Add New Student', formHTML, 'Create Student', 'Cancel', function() {
                    const name = document.getElementById('newStudentName').value.trim();
                    const email = document.getElementById('newStudentEmail').value.trim();
                    const password = document.getElementById('newStudentPassword').value.trim();
                    const roomId = document.getElementById('newStudentRoom').value;
                    if (!name || !email || !password) {
                        showToast('Please fill all required fields.', 'error');
                        return;
                    }
                    if (appData.users.find(u => u.email === email)) {
                        showToast('Email already exists.', 'error');
                        return;
                    }
                    const newUser = {
                        id: generateId(),
                        name,
                        email,
                        password,
                        role: 'student',
                        roomId: roomId || null,
                        avatar: getInitials(name)
                    };
                    appData.users.push(newUser);
                    if (roomId) {
                        const room = appData.rooms.find(r => r.id === roomId);
                        if (room && room.occupied < room.capacity) {
                            room.students.push(newUser.id);
                            room.occupied = room.students.length;
                        } else {
                            showToast('Selected room is full or invalid.', 'error');
                            appData.users.pop();
                            return;
                        }
                    }
                    persist();
                    addNotification(`New student ${name} created by ${currentUser.name}`, 'admin');
                    showToast(`Student ${name} created successfully!`, 'success');
                    renderManageStudents();
                    updateNotificationBadge();
                });
            });

            // Edit Student
            document.querySelectorAll('.edit-student-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.userid;
                    const student = getUserById(id);
                    if (!student) return;
                    const currentRoom = getRoomForStudent(id);
                    const roomOptions = appData.rooms.map(r =>
                        `<option value="${r.id}" ${currentRoom && r.id === currentRoom.id ? 'selected' : ''}>${r.number} (${r.occupied}/${r.capacity})</option>`
                    ).join('');
                    const formHTML = `
                        <div class="space-y-4">
                            <div><label class="text-xs font-medium text-gray-500 block mb-1">Full Name</label><input type="text" id="editStudentName" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB]/30 focus:border-[#2563EB] transition" value="${student.name}"></div>
                            <div><label class="text-xs font-medium text-gray-500 block mb-1">Email</label><input type="email" id="editStudentEmail" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB]/30 focus:border-[#2563EB] transition" value="${student.email}"></div>
                            <div><label class="text-xs font-medium text-gray-500 block mb-1">Password</label><input type="text" id="editStudentPassword" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB]/30 focus:border-[#2563EB] transition" value="${student.password}"></div>
                            <div><label class="text-xs font-medium text-gray-500 block mb-1">Assign Room</label>
                                <select id="editStudentRoom" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB]/30 focus:border-[#2563EB] transition">
                                    <option value="">— No room —</option>
                                    ${roomOptions}
                                </select>
                            </div>
                        </div>
                    `;
                    openEditModal('Edit Student', formHTML, function() {
                        const name = document.getElementById('editStudentName').value.trim();
                        const email = document.getElementById('editStudentEmail').value.trim();
                        const password = document.getElementById('editStudentPassword').value.trim();
                        const newRoomId = document.getElementById('editStudentRoom').value;
                        if (!name || !email || !password) {
                            showToast('Please fill all fields.', 'error');
                            return;
                        }
                        // Check email uniqueness (exclude self)
                        if (appData.users.find(u => u.email === email && u.id !== id)) {
                            showToast('Email already exists.', 'error');
                            return;
                        }
                        // Update user
                        student.name = name;
                        student.email = email;
                        student.password = password;
                        // Handle room change
                        const oldRoom = getRoomForStudent(id);
                        if (oldRoom) {
                            // Remove from old room
                            oldRoom.students = oldRoom.students.filter(sid => sid !== id);
                            oldRoom.occupied = oldRoom.students.length;
                        }
                        if (newRoomId) {
                            const newRoom = appData.rooms.find(r => r.id === newRoomId);
                            if (newRoom && newRoom.occupied < newRoom.capacity) {
                                newRoom.students.push(id);
                                newRoom.occupied = newRoom.students.length;
                                student.roomId = newRoomId;
                            } else {
                                showToast('Selected room is full or invalid.', 'error');
                                // Rollback: re-add to old room if existed
                                if (oldRoom) {
                                    oldRoom.students.push(id);
                                    oldRoom.occupied = oldRoom.students.length;
                                }
                                return;
                            }
                        } else {
                            student.roomId = null;
                        }
                        persist();
                        showToast('Student details updated successfully!', 'success');
                        renderManageStudents();
                        updateNotificationBadge();
                    });
                });
            });

            // Delete Student
            document.querySelectorAll('.delete-student-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.userid;
                    const student = getUserById(id);
                    if (!student) return;
                    confirmDelete(`Are you sure you want to remove <strong>${student.name}</strong>? This action cannot be undone.`, function() {
                        // Remove user
                        appData.users = appData.users.filter(u => u.id !== id);
                        // Remove from rooms
                        appData.rooms.forEach(r => {
                            r.students = r.students.filter(sid => sid !== id);
                            r.occupied = r.students.length;
                        });
                        persist();
                        showToast(`Student ${student.name} removed.`, 'success');
                        renderManageStudents();
                        updateNotificationBadge();
                    });
                });
            });
        }

                <div class="view-container">
                    <div class="bg-white rounded-xl p-6 border border-gray-200/60 shadow-sm">
                        <h3 class="text-lg font-semibold text-[#0b1e3a] mb-5">Room Occupancy</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${rooms.map(r => {
                                const students = r.students.map(id => getUserById(id)).filter(Boolean);
                                return `
                                    <div class="bg-[#F8FAFC] rounded-xl p-4 border border-gray-100 hover:shadow-md transition">
                                        <div class="flex items-center justify-between">
                                            <span class="font-bold text-lg text-[#0b1e3a]">${r.number}</span>
                                            <span class="text-xs font-medium px-2.5 py-1 rounded-full ${r.occupied === r.capacity ? 'badge-paid' : r.occupied > 0 ? 'badge-pending' : 'badge-unpaid'}">${r.occupied}/${r.capacity}</span>
                                        </div>
                                        <p class="text-xs text-gray-400 mt-1">${r.type} · ${r.capacity} bed${r.capacity > 1 ? 's' : ''}</p>
                                        ${students.length ? `
                                            <div class="mt-2 space-y-1">
                                                ${students.map(s => `
                                                    <div class="flex items-center justify-between text-xs">
                                                        <span class="text-gray-700">${s.name}</span>
                                                        <button data-studentid="${s.id}" class="reallocate-btn text-blue-600 hover:text-blue-800 text-xs font-medium">Change Room</button>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        ` : '<p class="text-xs text-gray-400 mt-2">Vacant</p>'}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;

            // Reallocate Room
            document.querySelectorAll('.reallocate-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const studentId = this.dataset.studentid;
                    const student = getUserById(studentId);
                    if (!student) return;
                    const currentRoom = getRoomForStudent(studentId);
                    const availableRooms = appData.rooms.filter(r =>
                        r.occupied < r.capacity && (currentRoom ? r.id !== currentRoom.id : true)
                    );
                    if (availableRooms.length === 0) {
                        showToast('No available rooms with capacity.', 'error');
                        return;
                    }
                    const roomOptions = availableRooms.map(r =>
                        `<option value="${r.id}">${r.number} (${r.occupied}/${r.capacity})</option>`
                    ).join('');
                    const formHTML = `
                        <div class="space-y-4">
                            <p class="text-sm text-gray-600">Reallocating <strong>${student.name}</strong> from <strong>${currentRoom ? currentRoom.number : 'No room'}</strong></p>
                            <div><label class="text-xs font-medium text-gray-500 block mb-1">Select New Room</label>
                                <select id="reallocateRoom" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB]/30 focus:border-[#2563EB] transition">
                                    ${roomOptions}
                                </select>
                            </div>
                        </div>
                    `;
                    showModal('Change Room Allocation', formHTML, 'Reallocate', 'Cancel', function() {
                        const newRoomId = document.getElementById('reallocateRoom').value;
                        if (!newRoomId) { showToast('Please select a room.', 'error'); return; }
                        const newRoom = appData.rooms.find(r => r.id === newRoomId);
                        if (!newRoom || newRoom.occupied >= newRoom.capacity) {
                            showToast('Selected room is full.', 'error');
                            return;
                        }
                        // Remove from old room
                        if (currentRoom) {
                            currentRoom.students = currentRoom.students.filter(id => id !== studentId);
                            currentRoom.occupied = currentRoom.students.length;
                        }
                        // Add to new room
                        newRoom.students.push(studentId);
                        newRoom.occupied = newRoom.students.length;
                        student.roomId = newRoomId;
                        persist();
                        showToast(`${student.name} reallocated to ${newRoom.number}`, 'success');
                        renderRoomOccupancy();
                        updateNotificationBadge();
                    });
                });
            });
        }

        // --- Leaves Approval (with dropdown status update) ---
        function renderLeavesApproval() {
            const pendingLeaves = appData.leaves.filter(l => l.status === 'pending');
            const allLeaves = appData.leaves.slice().sort((a, b) => new Date(b.from) - new Date(a.from));
            viewContainer.innerHTML = `
                <div class="view-container">
                    <div class="bg-white rounded-xl p-6 border border-gray-200/60 shadow-sm">
                        <h3 class="text-lg font-semibold text-[#0b1e3a] mb-1">Leaves Approval</h3>
                        <p class="text-sm text-gray-400 mb-5">${pendingLeaves.length} pending requests</p>
                        ${pendingLeaves.length ? `
                            <div class="space-y-3 mb-6">
                                ${pendingLeaves.map(l => {
                                    const student = getUserById(l.studentId);
                                    return `
                                        <div class="flex items-center justify-between border border-gray-100 rounded-xl p-4 hover:bg-[#F8FAFC] transition">
                                            <div><p class="font-medium text-gray-800">${student ? student.name : 'Unknown'}</p><p class="text-xs text-gray-400">${formatDate(l.from)} — ${formatDate(l.to)} · ${l.reason}</p></div>
                                            <div class="flex items-center gap-2">
                                                <select data-leaveid="${l.id}" class="status-select leave-status-select">
                                                    <option value="pending" selected>Pending</option>
                                                    <option value="approved">Approved</option>
                                                    <option value="rejected">Rejected</option>
                                                </select>
                                                <button data-leaveid="${l.id}" class="update-leave-status-btn text-xs font-medium px-3 py-1.5 bg-[#2563EB] hover:bg-[#1d4ed8] text-white rounded-lg transition">Update</button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : '<p class="text-sm text-gray-400 text-center py-4">No pending leave requests.</p>'}
                        <h4 class="font-semibold text-gray-700 mb-3 mt-6 border-t border-gray-100 pt-4">All Leave History</h4>
                        ${allLeaves.length ? `
                            <div class="space-y-2">
                                ${allLeaves.slice(0, 10).map(l => {
                                    const student = getUserById(l.studentId);
                                    return `
                                        <div class="flex items-center justify-between border-b border-gray-100 pb-2">
                                            <div><p class="text-sm text-gray-800">${student ? student.name : 'Unknown'} · ${formatDate(l.from)} — ${formatDate(l.to)}</p><p class="text-xs text-gray-400">${l.reason}</p></div>
                                            <span class="text-xs font-medium px-2.5 py-1 rounded-full ${l.status === 'approved' ? 'badge-approved' : l.status === 'pending' ? 'badge-pending' : 'badge-rejected'}">${l.status.charAt(0).toUpperCase()+l.status.slice(1)}</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : '<p class="text-sm text-gray-400 text-center py-4">No leave records.</p>'}
                    </div>
                </div>
            `;

            // Update leave status via dropdown
            document.querySelectorAll('.update-leave-status-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.leaveid;
                    const select = document.querySelector(`.leave-status-select[data-leaveid="${id}"]`);
                    if (!select) return;
                    const newStatus = select.value;
                    const leave = appData.leaves.find(l => l.id === id);
                    if (!leave) return;
                    if (leave.status === newStatus) {
                        showToast('Status unchanged.', 'error');
                        return;
                    }
                    const student = getUserById(leave.studentId);
                    leave.status = newStatus;
                    leave.approvedBy = currentUser.id;
                    persist();
                    addNotification(`Leave ${newStatus} for ${student ? student.name : 'student'}`, 'student');
                    addNotification(`Leave ${newStatus} for ${student ? student.name : 'student'}`, 'admin');
                    showToast(`Leave status updated to ${newStatus}!`, 'success');
                    renderLeavesApproval();
                    updateNotificationBadge();
                });
            });
        }

        // --- Visitor Entries (unchanged, no edit needed) ---
        function renderVisitorEntries() {
            const visitors = appData.visitors.slice().sort((a, b) => new Date(b.visitDate) - new Date(a.visitDate));
            viewContainer.innerHTML = `
                <div class="view-container">
                    <div class="bg-white rounded-xl p-6 border border-gray-200/60 shadow-sm">
                        <h3 class="text-lg font-semibold text-[#0b1e3a] mb-1">Visitor Entries</h3>
                        <p class="text-sm text-gray-400 mb-5">All visitor records</p>
                        ${visitors.length ? `
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead><tr class="text-left text-xs text-gray-400 border-b border-gray-100"><th class="pb-3 font-medium">Student</th><th class="pb-3 font-medium">Visitor</th><th class="pb-3 font-medium">Relation</th><th class="pb-3 font-medium">Date</th><th class="pb-3 font-medium">Time</th></tr></thead>
                                    <tbody>
                                        ${visitors.map(v => {
                                            const student = getUserById(v.studentId);
                                            return `
                                                <tr class="border-b border-gray-50 hover:bg-[#F8FAFC] transition">
                                                    <td class="py-3 font-medium text-gray-800">${student ? student.name : 'Unknown'}</td>
                                                    <td class="py-3 text-gray-700">${v.name}</td>
                                                    <td class="py-3 text-gray-500">${v.relation}</td>
                                                    <td class="py-3 text-gray-500">${formatDate(v.visitDate)}</td>
                                                    <td class="py-3 text-gray-500">${v.inTime} – ${v.outTime}</td>
                                                </tr>
                                            `;
                                        }).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : '<p class="text-sm text-gray-400 text-center py-8">No visitor records.</p>'}
                    </div>
                </div>
            `;
        }

        // --- Complaints Resolver (with dropdown status update) ---
        function renderComplaintsResolver() {
            const complaints = appData.complaints.filter(c => c.status !== 'resolved');
            const allComplaints = appData.complaints.slice().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            viewContainer.innerHTML = `
                <div class="view-container">
                    <div class="bg-white rounded-xl p-6 border border-gray-200/60 shadow-sm">
                        <h3 class="text-lg font-semibold text-[#0b1e3a] mb-1">Complaints Resolver</h3>
                        <p class="text-sm text-gray-400 mb-5">${complaints.length} open complaints</p>
                        ${complaints.length ? `
                            <div class="space-y-3 mb-6">
                                ${complaints.map(c => {
                                    const student = getUserById(c.createdBy);
                                    return `
                                        <div class="flex items-center justify-between border border-gray-100 rounded-xl p-4 hover:bg-[#F8FAFC] transition">
                                            <div><p class="font-medium text-gray-800">${c.title}</p><p class="text-xs text-gray-400">${student ? student.name : 'Unknown'} · ${c.category} · ${formatDate(c.createdAt)}</p><p class="text-xs text-gray-500 mt-1">${c.description}</p></div>
                                            <div class="flex items-center gap-2">
                                                <select data-complaintid="${c.id}" class="status-select complaint-status-select">
                                                    <option value="open" ${c.status === 'open' ? 'selected' : ''}>Open</option>
                                                    <option value="in-progress" ${c.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                                                    <option value="resolved" ${c.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                                                </select>
                                                <button data-complaintid="${c.id}" class="update-complaint-status-btn text-xs font-medium px-3 py-1.5 bg-[#2563EB] hover:bg-[#1d4ed8] text-white rounded-lg transition">Update</button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : '<p class="text-sm text-gray-400 text-center py-4">All complaints resolved! 🎉</p>'}
                        <h4 class="font-semibold text-gray-700 mb-3 mt-6 border-t border-gray-100 pt-4">All Complaints</h4>
                        ${allComplaints.length ? `
                            <div class="space-y-2">
                                ${allComplaints.slice(0, 10).map(c => {
                                    const student = getUserById(c.createdBy);
                                    return `
                                        <div class="flex items-center justify-between border-b border-gray-100 pb-2">
                                            <div><p class="text-sm text-gray-800">${c.title}</p><p class="text-xs text-gray-400">${student ? student.name : 'Unknown'} · ${formatDate(c.createdAt)}</p></div>
                                            <span class="text-xs font-medium px-2.5 py-1 rounded-full status-${c.status}">${c.status.charAt(0).toUpperCase()+c.status.slice(1)}</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : '<p class="text-sm text-gray-400 text-center py-4">No complaints.</p>'}
                    </div>
                </div>
            `;

            // Update complaint status via dropdown
            document.querySelectorAll('.update-complaint-status-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.complaintid;
                    const select = document.querySelector(`.complaint-status-select[data-complaintid="${id}"]`);
                    if (!select) return;
                    const newStatus = select.value;
                    const complaint = appData.complaints.find(c => c.id === id);
                    if (!complaint) return;
                    if (complaint.status === newStatus) {
                        showToast('Status unchanged.', 'error');
                        return;
                    }
                    const student = getUserById(complaint.createdBy);
                    complaint.status = newStatus;
                    if (newStatus === 'resolved') complaint.resolvedBy = currentUser.id;
                    persist();
                    addNotification(`Complaint "${complaint.title}" status updated to ${newStatus}`, 'student');
                    addNotification(`Complaint "${complaint.title}" status updated to ${newStatus}`, 'admin');
                    showToast(`Complaint status updated to ${newStatus}!`, 'success');
                    renderComplaintsResolver();
                    updateNotificationBadge();
                });
            });
        }

        // =============================================================
        // 17. INIT
        // =============================================================
        currentUser = null;
        sidebar.style.display = 'none';
        document.querySelector('header').style.display = 'none';
        showLogin();

        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) {
                appData = loadData();
                if (currentUser) {
                    renderView(currentView);
                    updateNotificationBadge();
                }
            }
        });

        window.__appData = appData;
        window.__reloadData = function() {
            appData = loadData();
            if (currentUser) renderView(currentView);
        };
        window.__showToast = showToast;

        console.log('🏠 HostelHub initialized with full CRUD.');
    })();
</script>

</body>
</html>
