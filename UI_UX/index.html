<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HostelHub - Design Preview</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
        }
        @media (min-width: 769px) {
            html, body, #root, #loginContainer, #signupContainer {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100vh !important;
                max-height: 100vh !important;
                overflow: hidden !important;
                background: #f8f9fa;
            }
        }
        @media (max-width: 768px) {
            html, body, #root, #loginContainer, #signupContainer {
                margin: 0;
                padding: 0;
                width: 100%;
                min-height: 100vh;
                overflow-y: auto !important;
                background: #f8f9fa;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/main.js"></script>
</body>
</html>
